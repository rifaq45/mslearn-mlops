name: Run Azure ML Job

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML extension
        run: az extension add -n ml

      - name: Run Azure Machine Learning training job
        run: |
          az ml job create -f src/job.yml --stream \
          --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
          --workspace-name ${{ vars.AZURE_ML_WORKSPACE }}
